<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Downloader</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

input {
    width: 80%;
    max-width: 500px;
    padding: 15px;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 10px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Max YouTube Downloader 🚀</h1>

    <input id="url" placeholder="Paste YouTube link">
    <br>
    <button onclick="download()">Download</button>

    <div class="result" id="result"></div>
</div>

<script>
async function download() {
    let url = document.getElementById("url").value.trim();

    // ❌ Empty input
    if (!url) {
        document.getElementById("result").innerHTML =
            "<p style='color:orange;'>⚠️ Please paste a URL first!</p>";
        return;
    }

    // ❌ Invalid format
    if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>❌ Please enter a valid YouTube URL</p>";
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Processing...";

    try {
        const res = await fetch(`https://max-downloader.onrender.com/api/download?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        // ❌ Backend error
        if (data.error) {
            document.getElementById("result").innerHTML =
                "<div style='background:#ff4d4d;padding:15px;border-radius:10px;'>❌ Invalid YouTube URL</div>";
            return;
        }

        // ✅ Success
        document.getElementById("result").innerHTML = `
            <h3>${data.title}</h3>
            document.getElementById("result").innerHTML = `
    <h3>${data.title}</h3>
    <button onclick="openDownload('${data.download}')">
        ⬇️ Download Video
    </button>
`;

function openDownload(link) {
    window.open(link, "_blank");
}
                <button>Download Video</button>
            </a>
        `;

    } catch (err) {
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>❌ Server error. Try again.</p>";
    }
}
</script>

</body>
</html>
